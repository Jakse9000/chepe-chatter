# =============================================================
# Chepe Chatter — source configuration
# Edit this file to add/remove sources. No coding needed.
# After editing, the next build picks up your changes.
#
# Each feed has:
#   name:   how it appears on the site
#   url:    the RSS/Atom feed address
#   lang:   "es" or "en"  (the language the feed is written in)
#   stream: where its stories go by default —
#             world  = Costa Rica in the world (international)
#             local  = Living here / Sports (auto-sorted by keywords)
#   trust:  optional. If true, items are always shown even if the
#           relevance filter can't find foreigner keywords.
#
# NOTE: feed URLs occasionally change. If one stops working the
# build just skips it and logs a warning — the site still updates.
# =============================================================

site:
  name: "Chepe Chatter"
  domain: "chepe-chatter.news"
  tagline_en: "Costa Rica news & culture, for newcomers"
  tagline_es: "Noticias y cultura de Costa Rica, para recién llegados"
  max_items_per_stream: 9
  max_events: 8             # how many upcoming cultural events to show
  max_traffic: 6            # how many road-closure items to show
  # Live-traffic buttons — open Google Maps' traffic layer / Waze (both have
  # real Costa Rica traffic data). Change coordinates to re-centre.
  traffic_map_google: "https://www.google.com/maps/@9.9281,-84.0907,11z/data=!5m1!1e1"
  traffic_map_waze: "https://www.waze.com/live-map?to=ll.9.9281%2C-84.0907"
  translate_hidden: true    # translate everything we show, so items still
                            # read in English when the filter is turned off

feeds:
  # ---- International coverage ABOUT Costa Rica (English) ----
  - name: "Google News — Costa Rica"
    url: "https://news.google.com/rss/search?q=%22Costa+Rica%22&hl=en-US&gl=US&ceid=US:en"
    lang: "en"
    stream: "world"
    trust: true

  # ---- English-language, already aimed at foreigners ----
  - name: "Q Costa Rica"
    url: "https://qcostarica.com/feed/"
    lang: "en"
    stream: "local"
    trust: true

  - name: "The Tico Times"
    url: "https://ticotimes.net/feed"
    lang: "en"
    stream: "local"
    trust: true

  # ---- Spanish-language local outlets ----
  - name: "Delfino.cr"
    url: "https://delfino.cr/feed"
    lang: "es"
    stream: "local"

  - name: "La Nación"
    url: "https://www.nacion.com/arc/outboundfeeds/rss/?outputType=xml"
    lang: "es"
    stream: "local"

  - name: "La Teja"
    url: "https://www.lateja.cr/arc/outboundfeeds/rss/?outputType=xml"
    lang: "es"
    stream: "local"

  - name: "El Mundo CR"
    url: "https://www.elmundo.cr/feed/"
    lang: "es"
    stream: "local"

  # ---- Road closures (auto-search of the news for cierres viales) ----
  - name: "Cierres viales"
    url: "https://news.google.com/rss/search?q=%28%22cierre+de+v%C3%ADas%22+OR+%22cierres+viales%22+OR+%22paso+restringido%22+OR+%22cierre+de+carriles%22%29+Costa+Rica&hl=es-419&gl=CR&ceid=CR:es"
    lang: "es"
    stream: "traffic"
    trust: true

# -------- Cultural events --------
# Events are now collected AUTOMATICALLY from GAM Cultural on every build
# (see events.py). The list below is only a FALLBACK, used if that source
# is ever unreachable — so the calendar is never empty. You can edit it,
# but normally you won't need to touch it.
#
# `events_fallback_link` is used for any event that has no link of its own.
events_fallback_link: "https://www.gamcultural.com/cr"
events:
  - day: "21"
    month: "Jun"
    title: "Festival de artes urbanas Transitarte"
    desc: "Música, danza y arte en vivo en los parques del centro. Entrada gratuita, todo público."
    where: "San José · Parque España"
    link: "https://www.gamcultural.com/cr/san-jose"
  - day: "27"
    month: "Jun"
    title: "506 Jazz Fest — noche de apertura"
    desc: "Agrupaciones de jazz nacionales e internacionales abren la semana del festival."
    where: "Teatro Nacional"
    link: "https://www.teatronacional.go.cr/"
  - day: "05"
    month: "Jul"
    title: "Feria Verde, mercado orgánico"
    desc: "Mercado de los sábados con productos locales, café y artesanías — favorito de los recién llegados."
    where: "Aranjuez, San José"
    link: "https://feriaverde.org/"
  - day: "18"
    month: "Jul"
    title: "Inauguración de arte contemporáneo — Museo MADC"
    desc: "Nueva exposición de artistas centroamericanos."
    where: "Museo de Arte y Diseño Contemporáneo"
    link: "https://www.madc.cr/"
