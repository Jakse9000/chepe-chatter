# =============================================================
# Chepe Chatter — source configuration
# Edit this file to add/remove sources. No coding needed.
# After editing, the next build picks up your changes.
#
# Each feed has:
#   name:   how it appears on the site
#   url:    the RSS/Atom feed address
#   lang:   "es" or "en"  (the language the feed is written in)
#   stream: where its stories go by default —
#             world  = Costa Rica in the world (international)
#             local  = Living here / Business / Sports (auto-sorted)
#   trust:  optional. If true, items are always shown even if the
#           relevance filter can't find foreigner keywords.
#
# NOTE: feed URLs occasionally change. If one stops working the
# build just skips it and logs a warning — the site still updates.
# =============================================================

site:
  name: "Chepe Chatter"
  domain: "chepe-chatter.news"
  # Full public address — used for SEO (canonical link, social-media preview
  # tags, robots.txt and sitemap.xml are all generated from it).
  url: "https://chepe-chatter.news"
  tagline_en: "Costa Rica news & culture"
  tagline_es: "Noticias y cultura de Costa Rica"
  max_items_per_stream: 9
  max_events: 8             # how many upcoming cultural events to show
  max_traffic: 6            # how many road-closure items to show
  # Weather chip in the header (San José). Current conditions, updates hourly.
  weather_lat: 9.9281
  weather_lon: -84.0907
  # --- Sponsor self-service (optional) ---
  # When set, businesses fill the on-page form and it lands in your Google
  # Sheet; you flip the row's `approved` cell to TRUE to publish it.
  # See setup/sponsor-form.gs and the README for the 5-minute setup.
  sponsor_submit_url: "https://script.google.com/macros/s/AKfycbxla3r9QvkAtQPDmW5RbjlnKfaE8exTKoLYVK6NI26rbjPeMNF88AVtNBcHwhaJEdA7/exec"
  sponsor_sheet_csv: "https://docs.google.com/spreadsheets/d/18rCuY4kzkA3obDLZ24bPJrHRXbkJBeFHwyp4uoB3cK8/gviz/tq?tqx=out:csv&sheet=Sponsors"
  # Fallback if the self-service form isn't set up yet: a simple email link.
  advertise_email: "jaakse@gmail.com"
  # Fixed-price payment. After a business submits the form, a "Pay with PayPal"
  # button appears. Get a link at paypal.me (e.g. https://paypal.me/yourname/25)
  # or use a PayPal hosted-button URL. Leave blank to hide payment.
  sponsor_price: "$25 / month"
  sponsor_paypal_url: "https://www.paypal.com/ncp/payment/JZ9VLJ7Z5QH7U"
  # Live-traffic buttons — open Google Maps' traffic layer / Waze (both have
  # real Costa Rica traffic data). Change coordinates to re-centre.
  traffic_map_google: "https://www.google.com/maps/@9.9281,-84.0907,11z/data=!5m1!1e1"
  traffic_map_waze: "https://www.waze.com/live-map?to=ll.9.9281%2C-84.0907"
  translate_hidden: true    # translate everything we show, so items still
                            # read in English when the filter is turned off

feeds:
  # ---- International coverage ABOUT Costa Rica (English) ----
  - name: "Google News — Costa Rica"
    url: "https://news.google.com/rss/search?q=%22Costa+Rica%22&hl=en-US&gl=US&ceid=US:en"
    lang: "en"
    stream: "world"
    trust: true

  # ---- English-language, already aimed at foreigners ----
  - name: "Q Costa Rica"
    url: "https://qcostarica.com/feed/"
    lang: "en"
    stream: "local"
    trust: true

  - name: "The Tico Times"
    url: "https://ticotimes.net/feed"
    lang: "en"
    stream: "local"
    trust: true

  # ---- Spanish-language local outlets ----
  - name: "Delfino.cr"
    url: "https://delfino.cr/feed"
    lang: "es"
    stream: "local"

  - name: "La Nación"
    url: "https://www.nacion.com/arc/outboundfeeds/rss/?outputType=xml"
    lang: "es"
    stream: "local"

  - name: "La Teja"
    url: "https://www.lateja.cr/arc/outboundfeeds/rss/?outputType=xml"
    lang: "es"
    stream: "local"

  - name: "El Mundo CR"
    url: "https://www.elmundo.cr/feed/"
    lang: "es"
    stream: "local"

  # ---- Road closures (auto-search of the news for cierres viales) ----
  - name: "Cierres viales"
    url: "https://news.google.com/rss/search?q=%28%22cierre+de+v%C3%ADas%22+OR+%22cierres+viales%22+OR+%22paso+restringido%22+OR+%22cierre+de+carriles%22%29+Costa+Rica&hl=es-419&gl=CR&ceid=CR:es"
    lang: "es"
    stream: "traffic"
    trust: true

# -------- Cultural events --------
# Events are now collected AUTOMATICALLY from GAM Cultural on every build
# (see events.py). The list below is only a FALLBACK, used if that source
# is ever unreachable — so the calendar is never empty. You can edit it,
# but normally you won't need to touch it.
#
# `events_fallback_link` is used for any event that has no link of its own.
events_fallback_link: "https://www.gamcultural.com/cr"
events:
  - day: "21"
    month: "Jun"
    title: "Festival de artes urbanas Transitarte"
    desc: "Música, danza y arte en vivo en los parques del centro. Entrada gratuita, todo público."
    where: "San José · Parque España"
    link: "https://www.gamcultural.com/cr/san-jose"
  - day: "27"
    month: "Jun"
    title: "506 Jazz Fest — noche de apertura"
    desc: "Agrupaciones de jazz nacionales e internacionales abren la semana del festival."
    where: "Teatro Nacional"
    link: "https://www.teatronacional.go.cr/"
  - day: "05"
    month: "Jul"
    title: "Feria Verde, mercado orgánico"
    desc: "Mercado de los sábados con productos locales, café y artesanías — favorito de los recién llegados."
    where: "Aranjuez, San José"
    link: "https://feriaverde.org/"
  - day: "18"
    month: "Jul"
    title: "Inauguración de arte contemporáneo — Museo MADC"
    desc: "Nueva exposición de artistas centroamericanos."
    where: "Museo de Arte y Diseño Contemporáneo"
    link: "https://www.madc.cr/"

# -------- Sponsors --------
# A small, tasteful "Supported by" card shown at the foot of the section(s)
# you assign each sponsor to. Assign several to the same section and they
# rotate automatically between builds. These two are EXAMPLES — replace them
# with real sponsors (or delete the list to hide sponsor cards entirely).
#
# Each sponsor:
#   name:        sponsor name (shown in bold)
#   tagline_en:  short line in English   (give one or both languages;
#   tagline_es:  short line in Spanish    a missing one is auto-translated)
#   logo:        optional URL to a small logo image ("" for none)
#   link:        where the card links to
#   sections:    which sections it appears in — any of:
#                world, living, business, sports, traffic, events  (or ["all"])
# Set `placeholder: true` on a sponsor to show an "available slot" card that
# invites businesses to book (it links to the booking form). Remove the flag
# and fill in real details once a sponsor signs up.
sponsors:
  - name: "Valley Relocation Co."
    placeholder: true
    tagline_en: "Residency, banking & moving help for newcomers."
    tagline_es: "Ayuda con residencia, bancos y mudanzas para recién llegados."
    logo: ""
    link: "https://example.com"
    sections: ["living"]
  - name: "Pura Vida Spanish School"
    placeholder: true
    tagline_en: "Learn Spanish in the heart of San José."
    tagline_es: "Aprende español en el corazón de San José."
    logo: ""
    link: "https://example.com"
    sections: ["events", "world"]
