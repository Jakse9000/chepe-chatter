name: Build & deploy Chepe Chatter

# WHEN this runs:
on:
  schedule:
    - cron: "0 * * * *"      # every hour, on the hour (UTC)
  workflow_dispatch: {}        # also lets you run it by hand from the Actions tab
  push:
    branches: [ main ]         # and whenever you edit feeds.yaml etc.

# Permissions needed to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let two runs deploy at once
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Re-use saved translations, AI verdicts and the 48h story archive
      # between runs (faster, cheaper, and stories survive feed hiccups)
      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            .translation_cache.json
            .classify_cache.json
            .archive.json
          key: caches-${{ github.run_id }}
          restore-keys: caches-

      - name: Build the site
        # AI sorting turns on automatically when ANTHROPIC_API_KEY exists as a
        # repo secret. If it's not set, the build uses the keyword rules.
        # For better translation, also add a DEEPL_API_KEY secret.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python build.py

      - name: Package the site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
